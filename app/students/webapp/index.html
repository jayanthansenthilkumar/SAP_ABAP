<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management</title>
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            services: {
                EndUserFeedback: { config: { enabled: false } }
            },
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            enableNotificationsUI: false,
                            enableNotifications: false,
                            enableSearch: false,
                            enablePersonalization: false,
                            enableSetTheme: true,
                            enableSetLanguage: true
                        }
                    }
                }
            },
            applications: {
                "student-app": {
                    title: "Students",
                    description: "Manage Student Records, Enrollments & Results",
                    additionalInformation: "SAPUI5.Component=students",
                    applicationType: "URL",
                    url: "/students/webapp",
                    navigationMode: "embedded"
                }
            }
        };
    </script>
    <script id="sap-ushell-bootstrap"
        src="https://sapui5.hana.ondemand.com/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
    <script id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m, sap.ui.core, sap.ushell, sap.fe.templates"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-preload="async">
    </script>
    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
